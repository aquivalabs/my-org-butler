description: "Prompt Template Smoke Test"

# Tests prompt templates in isolation via the Generations REST API.
# Most prompt coverage comes from agent tests (agent-regression.yaml).
# This file exists as a smoke test for the prompt provider itself.

providers:
  - id: "file://../.claude/skills/agentforce/providers/sf-generations-api.mjs"
    label: "Einstein Generations API"

prompts:
  - "{{promptTemplateName}}"

defaultTest:
  options:
    provider: "openai:gpt-4o"

tests:

  - description: "Consolidate memory: newer preference wins on conflict"
    vars:
      promptTemplateName: ConsolidateMemory
      consolidatedMemory: "User prefers opportunities sorted by Amount descending"
      newMemory: "User now wants opportunities sorted by CloseDate ascending"
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "The consolidated result sorts opportunities by CloseDate, not Amount — newer preference wins"

  - description: "Deduplication of identical memories"
    vars:
      promptTemplateName: ConsolidateMemory
      consolidatedMemory: "User wants Amount and CloseDate when viewing opportunities"
      newMemory: "Show Amount and CloseDate for opportunities"
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Contains only one entry about Amount and CloseDate for opportunities, not two duplicates"

  # ── AnswerFromFile ────────────────────────────────────────────────

  - description: "Extract total contract value from NDA"
    vars:
      promptTemplateName: AnswerFromFile
      userQuestion: "What is the total contract value and how is it split across phases?"
      file: "{{env.CONTENT_DOCUMENT_ID}}"
      sobjectInputs:
        file: "SOBJECT://ContentDocument"
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Mentions $500,000 total and references the three phases: $75,000 for Discovery, $250,000 for Implementation, $175,000 for Rollout"
