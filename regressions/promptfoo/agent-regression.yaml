description: "MyOrgButler Multi-Turn Agent Tests (promptfoo)"

# Single-turn tests live in Testing Center (Regression_Test.aiEvaluationDefinition).
# This file covers only multi-turn conversations that Testing Center can't handle.

providers:
  - id: "file://../../.claude/skills/agentforce/providers/sf-agent-api.mjs"
    label: "MyOrgButler"

prompts:
  - "{{utterance}}"

evaluateOptions:
  maxConcurrency: 1

defaultTest:
  vars:
    agentName: MyOrgButler
    apiVersion: v65.0
  options:
    provider: "openai:gpt-4o"

tests:

  # ── File grounding: find file, then ask about content ─────────────

  - description: "Find the sample document on the Acme opportunity"
    vars:
      utterance: "what files are attached to the Acme Q1 Expansion Deal"
      conversationId: file-grounding
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Lists or mentions the Sample Company Document file"

  - description: "Ask a content question that spans multiple sections"
    vars:
      utterance: "open that document and tell me what the total contract value is and what remedies are available if the agreement is breached"
      conversationId: file-grounding
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Mentions $500,000 total contract value and references equitable relief or injunction as breach remedies"

  # ── Drill-down: query then follow up on a result ──────────────────

  # 4: Object diagram
  - vars:
      utterance: "show me a diagram of the custom objects in this org"
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Provides a diagram link showing object relationships"

  # 5: Web search
  - vars:
      utterance: "who built this assistant? search the web for Aquiva Labs"
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Provides information about Aquiva Labs as a Salesforce company"

  # 6: Apex code via Tooling API
  - vars:
      utterance: "how much Apex code is in this org?"
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Returns the count or list of Apex classes"

  # 7: Metadata API
  - vars:
      utterance: "use the Metadata API to read the aquiva_os__MyOrgButlerUser permission set definition"
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Shows the permission set configuration from the Metadata API"

  # 8: File reading
  - vars:
      utterance: "summarize the Acme Corporation NDA 2026 document"
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Summarizes the NDA document covering confidentiality obligations"

  # 9: Scheduling
  - vars:
      utterance: "schedule a daily task: check for opportunities closing this week and notify me"
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Confirms a recurring plan or schedule was created"

  # 10: Notifications
  - vars:
      utterance: "notify me that the quarterly report is ready for review"
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Confirms the notification was sent to the current user"

  # 11: Data Cloud exploration
  - vars:
      utterance: "what Data Cloud entities are available in this org?"
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Lists Data Cloud entity names (DMOs, DLOs, or Calculated Insights)"

  # 12: Data Cloud query
  - vars:
      utterance: "query the users from Data Cloud"
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Shows user records with names or emails from Data Cloud"

  # ── Multi-turn conversations ────────────────────────────────────────

  # Conversation A: Drill into query results
  - description: "Ask for opportunities"
    vars:
      utterance: "Show me my open opportunities"
      conversationId: drill-down
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Lists multiple opportunities with names and amounts"

  - description: "Drill into the first one"
    vars:
      utterance: "Tell me more about the first one you listed"
      conversationId: drill-down
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Provides details about a specific opportunity from the previous list"

  # ── Correction: narrow scope mid-conversation ─────────────────────

  - description: "Ask about Acme opportunities"
    vars:
      utterance: "How many opportunities does Acme have?"
      conversationId: correction
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Returns a count of Acme opportunities"

  - description: "Correct the scope"
    vars:
      utterance: "I meant only Acme Corporation, not any other account with Acme in the name"
      conversationId: correction
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Acknowledges the correction and narrows scope to Acme Corporation"

  # ── Memory: correct format and store preference ───────────────────

  - description: "Ask for opportunities in default format"
    vars:
      utterance: "Show me my opportunities"
      conversationId: memory
    assert:
      - type: javascript
        value: "output.success === true"

  - description: "Correct and ask to remember"
    vars:
      utterance: "No, I want to see Amount and CloseDate fields too. Store that in memory so you always show them."
      conversationId: memory
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Confirms it stored the preference in memory to always include Amount and CloseDate fields"
