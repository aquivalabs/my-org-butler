description: "Prompt Template Smoke Test"

# Tests prompt templates in isolation via the Generations REST API.
# Most prompt coverage comes from agent tests (agent-regression.yaml).
# This file exists as a smoke test for the prompt provider itself.

providers:
  - id: "file://../.claude/skills/agentforce-eval/providers/sf-generations-api.mjs"
    label: "Einstein Generations API"

prompts:
  - "{{promptTemplateName}}"

defaultTest:
  options:
    provider: "openai:gpt-4o"

tests:

  - description: "Consolidate memory: newer preference wins on conflict"
    vars:
      promptTemplateName: ConsolidateMemory
      consolidatedMemory: "User prefers opportunities sorted by Amount descending"
      newMemory: "User now wants opportunities sorted by CloseDate ascending"
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "The consolidated result sorts opportunities by CloseDate, not Amount — newer preference wins"
