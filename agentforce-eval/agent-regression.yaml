description: "MyOrgButler Regression Tests"

providers:
  - id: "file://../.claude/skills/agentforce-eval/providers/sf-agent-api.mjs"
    label: "MyOrgButler"

prompts:
  - "{{utterance}}"

evaluateOptions:
  maxConcurrency: 1

defaultTest:
  options:
    provider: "openai:o3-mini"

tests:

  # ── Single-turn tests ──────────────────────────────────────────────

  # 1: Opportunity recommendation
  - vars:
      utterance: "which opportunity should I focus on next"
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Recommends an opportunity based on value and close date"

  # 2: Task creation
  - vars:
      utterance: "create a follow-up task for the Burlington Textiles opportunity"
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Confirms task creation with a link to view it"

  # 3: Org customizations
  - vars:
      utterance: "I'm new here, what customizations does this org have?"
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Lists custom objects including Memory__c"

  # 4: Object diagram
  - vars:
      utterance: "show me a diagram of the custom objects in this org"
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Provides a diagram link showing object relationships"

  # 5: Web search
  - vars:
      utterance: "who built this assistant? search the web for Aquiva Labs"
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Provides information about Aquiva Labs as a Salesforce company"

  # 6: GitHub integration
  - vars:
      utterance: "are there any open issues on the aquivalabs/my-org-butler repo?"
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Shows open GitHub issues from the repository"

  # 7: Apex code via Tooling API
  - vars:
      utterance: "how much Apex code is in this org?"
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Returns the count or list of Apex classes"

  # 8: Metadata API
  - vars:
      utterance: "use the Metadata API to read the aquiva_os__MyOrgButlerUser permission set definition"
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Shows the permission set configuration from the Metadata API"

  # 9: Vector database search
  - vars:
      utterance: "what is Aquiva's work and travel policy?"
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Provides information about Aquiva's work and travel policy from the knowledge base"

  # 10: File reading
  - vars:
      utterance: "read the files attached to the Acme Q1 Expansion Deal and summarize what they contain"
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Summarizes the NDA document content"

  # 11: Scheduling
  - vars:
      utterance: "every weekday at 9am, check for opportunities closing this week and notify me"
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Confirms a plan was scheduled for weekdays at 9am with a cron expression"

  # 12: Notifications
  - vars:
      utterance: "notify me that the quarterly report is ready for review"
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Confirms the notification was sent to the current user"

  # ── Context variables ───────────────────────────────────────────────

  # 13: Current record context — pass an Opportunity ID as if opened from a record page
  - vars:
      utterance: "summarize the current opportunity"
      contextVariables:
        currentRecordId: "006O200000Wp39vIAB"
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Summarizes an opportunity including amount, stage, and close date without asking which one"

  # ── Multi-turn conversations ────────────────────────────────────────

  # Conversation A: Drill into query results
  - description: "Ask for opportunities"
    vars:
      utterance: "Show me my open opportunities"
      conversationId: drill-down
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Lists multiple opportunities with names and amounts"

  - description: "Drill into the first one"
    vars:
      utterance: "Tell me more about the first one you listed"
      conversationId: drill-down
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Provides details about a specific opportunity from the previous list"

  # Conversation B: Preference storage + verification
  - description: "Set a display preference"
    vars:
      utterance: "From now on, always sort my opportunities by close date"
      conversationId: preference
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Confirms it will remember the sorting preference"

  - description: "Check if preference was applied"
    vars:
      utterance: "Show me my opportunities"
      conversationId: preference
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Shows opportunities sorted by close date, soonest first"

  # Conversation C: Correction flow
  - description: "Ask about Acme opportunities"
    vars:
      utterance: "How many opportunities does Acme have?"
      conversationId: correction
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Returns a count of Acme opportunities"

  - description: "Correct the scope"
    vars:
      utterance: "I meant only Acme Corporation, not any other account with Acme in the name"
      conversationId: correction
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Acknowledges the correction and narrows scope to Acme Corporation"

  # Conversation D: Memory — agent gets it wrong, user corrects and stores preference
  - description: "Ask for opportunities in wrong format"
    vars:
      utterance: "Show me my opportunities"
      conversationId: memory
    assert:
      - type: javascript
        value: "output.success === true"

  - description: "Correct and ask to remember"
    vars:
      utterance: "No, I want to see Amount and CloseDate fields too. Store that in memory so you always show them."
      conversationId: memory
    assert:
      - type: javascript
        value: "output.success === true"
      - type: llm-rubric
        value: "Confirms it stored the preference in memory to always include Amount and CloseDate fields"
