name: SF PR Feedback
run-name: "Feedback on PR #${{ github.event.issue.number || github.event.pull_request.number }}"
# Fires on every (non-bot) comment on a PR carrying the `ai-generated` label.
# No @claude mention required — on AI-generated PRs Claude is the default
# reviewer-replier. The label is set by the issue workflow when it opens the
# PR. Provisions a fresh scratch org per iteration — until we ship
# persistent-org-per-PR (see Issue #67 TODOs).

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  respond:
    # Only on PRs (issue_comment fires for both PRs and issues) and not from a bot.
    if: |
      (github.event.issue.pull_request != null || github.event_name == 'pull_request_review_comment') &&
      github.event.comment.user.type != 'Bot'
    runs-on: ubuntu-latest
    env:
      DEV_HUB_URL: set
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Resolve PR and skip non-AI PRs
        id: pr
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
        run: |
          PR_NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"
          PR_DATA=$(gh pr view "$PR_NUMBER" --repo ${{ github.repository }} --json headRefName,labels)
          PR_BRANCH=$(echo "$PR_DATA" | jq -r '.headRefName')
          HAS_AI_LABEL=$(echo "$PR_DATA" | jq -r '.labels[].name' | grep -c '^ai-generated$' || true)
          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "branch=$PR_BRANCH" >> $GITHUB_OUTPUT
          if [ "$HAS_AI_LABEL" -eq 0 ]; then
            echo "::notice::PR #$PR_NUMBER has no 'ai-generated' label — nothing to do."
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.pr.outputs.skip != 'true'
        with:
          ref: ${{ steps.pr.outputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.WORKFLOW_PAT }}

      - name: Install Salesforce CLI
        if: steps.pr.outputs.skip != 'true'
        run: npm install --global @salesforce/cli

      - name: Authenticate DevHub
        if: steps.pr.outputs.skip != 'true'
        run: sf org login sfdx-url --set-default-dev-hub --sfdx-url-stdin <<< "${{ secrets.SFDX_AUTH_URL }}"

      - name: Provision scratch org and run baseline tests
        if: steps.pr.outputs.skip != 'true'
        run: HEADLESS=true ./scripts/create-scratch-org.sh

      - name: Snapshot Claude session JSONLs (pre-run)
        if: steps.pr.outputs.skip != 'true'
        run: ./scripts/snapshot-jsonl.sh /tmp/jsonl-before.txt

      - uses: anthropics/claude-code-action@v1
        if: steps.pr.outputs.skip != 'true'
        with:
          prompt: |
            Read .claude/skills/sf-ticket-to-pr/SKILL.md for instructions.

            You are responding to feedback on PR #${{ steps.pr.outputs.number }} (branch ${{ steps.pr.outputs.branch }}).
            The PR is already open — do not open a second one. Just push to the branch.

            Reviewer comment:
            ${{ github.event.comment.body }}
          claude_args: "--max-turns 30 --model claude-sonnet-4-6"
          show_full_output: "true"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.WORKFLOW_PAT }}

      - name: Report AI cost
        if: always() && steps.pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          COMMENT_ID: ${{ github.event.comment.id }}
          WORKFLOW_NAME: pr-feedback
          MODEL: claude-sonnet-4-6
          JSONL_BEFORE: /tmp/jsonl-before.txt
        run: |
          # Resolve issue number from "Closes #N" in PR body for sticky rollup.
          BODY=$(gh pr view "$PR_NUMBER" --repo ${{ github.repository }} --json body --jq .body)
          ISSUE_NUMBER=$(echo "$BODY" | grep -oiE '(close[sd]?|fix(e[sd])?|resolve[sd]?) #[0-9]+' | grep -oE '[0-9]+' | head -n 1 || true)
          export ISSUE_NUMBER
          ./scripts/report-ai-cost.sh || echo "::warning::cost report failed"
