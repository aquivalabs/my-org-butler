name: SF PR Feedback

run-name: "Feedback on PR #${{ github.event.issue.number || github.event.pull_request.number }}"
# Fires on every (non-bot) comment on a PR carrying the `ai-generated` label.
# No @claude mention required — on AI-generated PRs Claude is the default
# reviewer-replier. The label is set by the issue workflow when it opens the
# PR. Reuses the per-PR scratch org via cached SFDX auth URL — provisioning
# only re-runs if the cache is missing or the org has expired.

on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

jobs:
  respond:
    # Three event types feed in: PR conversation comments, PR review submissions
    # (the body of a "Request changes" / "Approve" / "Comment" review), and inline
    # code-line comments. issue_comment fires for both issues and PRs — the first
    # branch filters to PRs only. Bot-authored events are filtered per-branch
    # because the user lives under different paths (comment.user vs review.user).
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && github.event.comment.user.type != 'Bot') ||
      (github.event_name == 'pull_request_review_comment' && github.event.comment.user.type != 'Bot') ||
      (github.event_name == 'pull_request_review' && github.event.review.user.type != 'Bot' && github.event.review.body != '')
    runs-on: ubuntu-latest
    # Serialize feedback runs on the same PR so two comments don't race against the same scratch org.
    concurrency:
      group: scratch-org-feedback-pr-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: false
    env:
      DEV_HUB_URL: set
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Resolve PR and skip non-AI PRs
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"
          PR_DATA=$(gh pr view "$PR_NUMBER" --repo ${{ github.repository }} --json headRefName,labels,body)
          PR_BRANCH=$(echo "$PR_DATA" | jq -r '.headRefName')
          PR_BODY=$(echo "$PR_DATA" | jq -r '.body')
          # Recent commits on the PR branch — handed to Claude so it doesn't have to fetch them.
          PR_COMMITS=$(gh pr view "$PR_NUMBER" --repo ${{ github.repository }} --json commits --jq '.commits[-5:] | reverse | .[] | "- \(.oid[:7]) \(.messageHeadline)"')
          HAS_AI_LABEL=$(echo "$PR_DATA" | jq -r '.labels[].name' | grep -c '^ai-generated$' || true)
          # Resolve the originating issue number from "Closes #N" — used both for the cost rollup
          # and as the persistent scratch org alias (pr-<N>) shared with sf-ticket-to-pr.yml.
          ISSUE_NUMBER=$(echo "$PR_BODY" | grep -oiE '(close[sd]?|fix(e[sd])?|resolve[sd]?) #[0-9]+' | grep -oE '[0-9]+' | head -n 1 || true)
          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "branch=$PR_BRANCH" >> $GITHUB_OUTPUT
          echo "issue_number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT
          # Multi-line outputs use the heredoc form so embedded newlines survive.
          { echo "body<<EOF_BODY"; echo "$PR_BODY"; echo "EOF_BODY"; } >> $GITHUB_OUTPUT
          { echo "commits<<EOF_COMMITS"; echo "$PR_COMMITS"; echo "EOF_COMMITS"; } >> $GITHUB_OUTPUT
          if [ "$HAS_AI_LABEL" -eq 0 ]; then
            echo "::notice::PR #$PR_NUMBER has no 'ai-generated' label — nothing to do."
            echo "skip=true" >> $GITHUB_OUTPUT
          fi
          if [ -z "$ISSUE_NUMBER" ] && [ "$HAS_AI_LABEL" -ne 0 ]; then
            echo "::warning::PR #$PR_NUMBER has no 'Closes #N' reference — falling back to PR number for scratch org alias"
            echo "issue_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.pr.outputs.skip != 'true'
        with:
          ref: ${{ steps.pr.outputs.branch }}
          fetch-depth: 0

      - name: Configure git as github-actions bot
        if: steps.pr.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install Salesforce CLI
        if: steps.pr.outputs.skip != 'true'
        run: npm install --global @salesforce/cli

      - name: Authenticate DevHub
        if: steps.pr.outputs.skip != 'true'
        run: sf org login sfdx-url --set-default-dev-hub --sfdx-url-stdin <<< "${{ secrets.SFDX_AUTH_URL }}"

      # Restore the per-PR scratch org's auth URL. Cache hit → create-scratch-org.sh re-logs in
      # and skips provisioning. Cache miss (first feedback after cache eviction, or org expired) →
      # the script falls through to a full provisioning run.
      - name: Restore scratch org auth from cache
        if: steps.pr.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: /tmp/sfdx-auth-pr-${{ steps.pr.outputs.issue_number }}.url
          key: scratch-auth-pr-${{ steps.pr.outputs.issue_number }}

      - name: Restore or provision scratch org
        if: steps.pr.outputs.skip != 'true'
        env:
          ISSUE_NUMBER: ${{ steps.pr.outputs.issue_number }}
          SCRATCH_ORG_ALIAS: pr-${{ steps.pr.outputs.issue_number }}
        run: HEADLESS=true ./scripts/create-scratch-org.sh

      - uses: anthropics/claude-code-action@v1
        id: claude
        if: steps.pr.outputs.skip != 'true'
        env:
          SCRATCH_ORG_ALIAS: pr-${{ steps.pr.outputs.issue_number }}
        with:
          prompt: |
            Read .claude/skills/sf-ticket-to-pr/SKILL.md for instructions.

            You are responding to feedback on PR #${{ steps.pr.outputs.number }} (branch ${{ steps.pr.outputs.branch }}).
            The PR is already open — do not open a second one. Just push to the branch.

            PR description:
            ${{ steps.pr.outputs.body }}

            Recent commits on this branch (newest first):
            ${{ steps.pr.outputs.commits }}

            Reviewer comment:
            ${{ github.event.comment.body || github.event.review.body }}
          claude_args: "--max-turns 60 --model claude-sonnet-4-6"
          show_full_output: "true"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Report AI cost
        if: always() && steps.pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          ISSUE_NUMBER: ${{ steps.pr.outputs.issue_number }}
          COMMENT_ID: ${{ github.event.comment.id }}
          WORKFLOW_NAME: pr-feedback
          MODEL: claude-sonnet-4-6
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: ./scripts/report-ai-cost.sh || echo "::warning::cost report failed"
