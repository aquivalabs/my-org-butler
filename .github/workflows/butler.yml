name: Butler

run-name: "Ticket #${{ github.event.issue.number || github.event.pull_request.number }}: ${{ github.event.issue.title || github.event.pull_request.title }}"

# Mention-driven AI workflow. Fires when an Aquiva collaborator (or higher)
# writes "@butler" in an issue body, issue comment, PR review, or PR review
# comment. The agent reads the full thread itself and decides what to do —
# work the ticket, ask for clarification, propose a split, or refuse. There
# is no label state machine; every fire is independent and re-reads the
# conversation from scratch.
#
# Cost protection: events from anyone whose author_association isn't OWNER,
# MEMBER, or COLLABORATOR are silently ignored. That replaces the old
# "delegate-to-ai label" gate without leaving an open-source DoS surface.
# Bot-authored events are also dropped so the agent can't summon itself.
#
# The only label still in use is `ai-generated`, applied by the agent when it
# opens a PR. It's purely informational — humans can filter the PR list by it.

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # Cheap first pass: read the thread, decide whether to proceed. Posts
  # whatever comment the agent thinks is appropriate (plan, clarifying
  # question, split proposal, refusal). Outputs proceed=true only when the
  # agent has committed to doing the work in the same run.
  triage:
    name: triage
    # Author-association strings live in event-specific paths; flatten them
    # here. The contains() checks both gate access AND filter out events
    # without an @butler mention so we don't burn Claude credits on noise.
    if: |
      (
        (github.event_name == 'issues' &&
         contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association) &&
         contains(github.event.issue.body, '@butler') &&
         github.event.issue.user.type != 'Bot') ||
        (github.event_name == 'issue_comment' &&
         contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
         contains(github.event.comment.body, '@butler') &&
         github.event.comment.user.type != 'Bot') ||
        (github.event_name == 'pull_request_review' &&
         contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association) &&
         contains(github.event.review.body, '@butler') &&
         github.event.review.user.type != 'Bot') ||
        (github.event_name == 'pull_request_review_comment' &&
         contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
         contains(github.event.comment.body, '@butler') &&
         github.event.comment.user.type != 'Bot')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    outputs:
      proceed: ${{ steps.outcome.outputs.proceed }}
      kind: ${{ steps.context.outputs.kind }}
      number: ${{ steps.context.outputs.number }}
      pr_branch: ${{ steps.context.outputs.pr_branch }}
      plan: ${{ steps.outcome.outputs.plan }}
    steps:
      - uses: actions/checkout@v4

      # Normalize the event into a few simple variables: is this an issue or a
      # PR? what's the number? if it's a PR, what's the head branch? The agent
      # and the execute job both want this without re-deriving it from each
      # event shape.
      - name: Resolve context
        id: context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            NUMBER="${{ github.event.pull_request.number }}"
            KIND=pr
          elif [ -n "${{ github.event.issue.pull_request.url }}" ]; then
            NUMBER="${{ github.event.issue.number }}"
            KIND=pr
          else
            NUMBER="${{ github.event.issue.number }}"
            KIND=issue
          fi
          PR_BRANCH=""
          if [ "$KIND" = "pr" ]; then
            PR_BRANCH=$(gh pr view "$NUMBER" --repo ${{ github.repository }} --json headRefName --jq .headRefName)
          fi
          echo "kind=$KIND" >> $GITHUB_OUTPUT
          echo "number=$NUMBER" >> $GITHUB_OUTPUT
          echo "pr_branch=$PR_BRANCH" >> $GITHUB_OUTPUT
          echo "::notice::context kind=$KIND number=$NUMBER branch=$PR_BRANCH"

      - name: Decide
        uses: anthropics/claude-code-action@v1
        id: claude
        with:
          prompt: |
            Read .claude/skills/sf-ticket-to-pr/SKILL.md for instructions.

            You were summoned by an @butler mention on ${{ steps.context.outputs.kind }} #${{ steps.context.outputs.number }} of ${{ github.repository }}.

            Execute ONLY the triage decision — read the full thread (use
            `gh issue view ${{ steps.context.outputs.number }} --repo ${{ github.repository }} --comments`
            for issues, or `gh pr view ${{ steps.context.outputs.number }} --repo ${{ github.repository }} --comments`
            for PRs), then pick one of: take it, ask for clarification, propose
            a split, or refuse.

            **You MUST post your decision as a real GitHub comment by running
            the shell command below.** Emitting the comment text in your
            response does NOT post it; nothing is visible to humans or to the
            execute job unless you actually call `gh`:

                cat > /tmp/butler-reply.md <<'EOF'
                <your comment body here>
                EOF
                gh ${{ steps.context.outputs.kind == 'pr' && 'pr' || 'issue' }} comment ${{ steps.context.outputs.number }} --repo ${{ github.repository }} --body-file /tmp/butler-reply.md

            If — and only if — you are taking the work in this run, end the
            file content with a single trailing line containing exactly:

                <!-- butler:proceed -->

            That HTML-comment marker is how the execute job decides to fire.
            Do not include it for clarifications, splits, or refusals.

            STOP after posting the comment — there is no Salesforce CLI or
            scratch org available here; the execute job runs next and depends
            on whether you set the proceed marker.

            Tone: strong opinions, no "Great question!" or "I'd be happy to
            help!", brevity mandatory, no emojis, call things out if the
            request is unclear or risky.
          claude_args: "--max-turns 30 --model claude-sonnet-4-6"
          show_full_output: "true"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # Detect the "proceed" marker by scanning the last bot comment posted on
      # the issue or PR. The marker is an HTML comment so it renders invisibly
      # in GitHub but is trivially greppable here.
      - name: Determine outcome
        id: outcome
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUMBER: ${{ steps.context.outputs.number }}
        run: |
          LAST=$(gh api "/repos/${{ github.repository }}/issues/$NUMBER/comments" --jq 'map(select(.user.type == "Bot")) | last.body')
          if echo "$LAST" | grep -q 'butler:proceed'; then
            echo "::notice::Triage outcome: proceed — execute job will run."
            echo "proceed=true" >> $GITHUB_OUTPUT
            { echo "plan<<EOF_PLAN"; echo "$LAST"; echo "EOF_PLAN"; } >> $GITHUB_OUTPUT
          else
            echo "::notice::Triage outcome: stop — execute job will be skipped."
            echo "proceed=false" >> $GITHUB_OUTPUT
          fi

      - name: Notify on triage failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUMBER: ${{ steps.context.outputs.number }}
          KIND: ${{ steps.context.outputs.kind }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$KIND" = "pr" ]; then
            gh pr comment "$NUMBER" --repo ${{ github.repository }} --body "Triage failed before I could decide. See the [run logs]($RUN_URL). Mention me again to retry."
          else
            gh issue comment "$NUMBER" --repo ${{ github.repository }} --body "Triage failed before I could decide. See the [run logs]($RUN_URL). Mention me again to retry."
          fi

  execute:
    name: execute
    needs: triage
    if: needs.triage.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    # Serialize runs against the same PR/issue scratch org so two mentions
    # don't race. The scratch alias is pr-<issue-number>; for a fresh issue
    # the issue number IS the future PR number's basis.
    concurrency:
      group: scratch-org-${{ needs.triage.outputs.number }}
      cancel-in-progress: false
    env:
      DEV_HUB_URL: set
      KIND: ${{ needs.triage.outputs.kind }}
      NUMBER: ${{ needs.triage.outputs.number }}
      PR_BRANCH: ${{ needs.triage.outputs.pr_branch }}
      SCRATCH_ORG_ALIAS: pr-${{ needs.triage.outputs.number }}
      ISSUE_NUMBER: ${{ needs.triage.outputs.number }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      # Issue path: branch off main. PR path: check out the PR's head branch.
      # Both use full history so the agent can read prior commits if needed.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.triage.outputs.kind == 'pr' && needs.triage.outputs.pr_branch || '' }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create branch for new issue
        if: needs.triage.outputs.kind == 'issue'
        run: git checkout -b "fix/issue-${{ needs.triage.outputs.number }}"

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Authenticate DevHub
        run: sf org login sfdx-url --set-default-dev-hub --sfdx-url-stdin <<< "${{ secrets.SFDX_AUTH_URL }}"

      # Cached per-PR scratch org auth. Cache hit → create-scratch-org.sh
      # re-logs in and skips provisioning. Cache miss → full provision.
      - name: Restore scratch org auth from cache
        uses: actions/cache@v4
        with:
          path: /tmp/sfdx-auth-${{ env.SCRATCH_ORG_ALIAS }}.url
          key: scratch-auth-${{ env.SCRATCH_ORG_ALIAS }}

      - name: Provision or restore scratch org
        run: HEADLESS=true ./scripts/create-scratch-org.sh

      - name: Do the work
        uses: anthropics/claude-code-action@v1
        id: claude
        with:
          prompt: |
            Read .claude/skills/sf-ticket-to-pr/SKILL.md for instructions.

            You were summoned by an @butler mention on ${{ env.KIND }} #${{ env.NUMBER }}. Triage has already decided you are taking the work in this run; the proceed marker is set. Skip the triage decision and go straight to coding, verifying, and shipping.

            Your earlier triage comment (the plan you committed to):

            --- Plan ---
            ${{ needs.triage.outputs.plan }}
            --- End plan ---

            Read the full thread for context (`gh ${{ env.KIND == 'pr' && 'pr' || 'issue' }} view ${{ env.NUMBER }} --repo ${{ github.repository }} --comments`).

            Tone for human-facing text: strong opinions, no "Great question!" or "I'd be happy to help!", brevity mandatory, no emojis, call out anything unclear or risky.
          claude_args: "--max-turns 90 --model claude-sonnet-4-6"
          show_full_output: "true"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Report AI cost
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.triage.outputs.kind == 'pr' && needs.triage.outputs.number || '' }}
          ISSUE_NUMBER: ${{ needs.triage.outputs.number }}
          COMMENT_ID: ${{ github.event.comment.id }}
          WORKFLOW_NAME: butler
          MODEL: claude-sonnet-4-6
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: ./scripts/report-ai-cost.sh || echo "::warning::cost report failed"

      - name: Notify on execute failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUMBER: ${{ needs.triage.outputs.number }}
          KIND: ${{ needs.triage.outputs.kind }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$KIND" = "pr" ]; then
            gh pr comment "$NUMBER" --repo ${{ github.repository }} --body "I couldn't finish — the run errored. See the [run logs]($RUN_URL). Mention me again to retry."
          else
            gh issue comment "$NUMBER" --repo ${{ github.repository }} --body "I couldn't finish — the run errored. See the [run logs]($RUN_URL). Mention me again to retry."
          fi
