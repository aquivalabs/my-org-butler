name: SF Ticket to PR
run-name: "Ticket #${{ github.event.issue.number || inputs.issue_number }}: ${{ github.event.issue.title || inputs.issue_title }}"
# Fires when an issue is opened. Claude reads it, decides if it can be solved
# autonomously, and either opens a tested PR or comments on the issue explaining why not.

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to process
        required: true
      issue_title:
        description: Issue title
        required: true
      issue_body:
        description: Issue body
        required: false

jobs:
  ticket-to-pr:
    name: ticket-to-pr
    runs-on: ubuntu-latest
    env:
      # Tells create-scratch-org.sh to skip the "set DevHub by alias" + "delete old scratch org" branch.
      # Auth is already done in the workflow step below; the value just needs to be non-empty.
      DEV_HUB_URL: set
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use PAT with `workflow` scope so Claude's later `git push` is allowed
          # to ship branches that contain workflow files. GITHUB_TOKEN cannot do this.
          token: ${{ secrets.WORKFLOW_PAT }}

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Authenticate DevHub
        run: sf org login sfdx-url --set-default-dev-hub --sfdx-url-stdin <<< "${{ secrets.SFDX_AUTH_URL }}"

      - name: Create branch for the fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "fix/issue-${{ github.event.issue.number || inputs.issue_number }}"

      - name: Provision scratch org and run baseline tests
        run: HEADLESS=true ./scripts/create-scratch-org.sh 7

      - name: Publish scratch org credentials
        run: |
          source ./scripts/config.sh
          sf org password generate --target-org "$SCRATCH_ORG_ALIAS"
          {
            echo "## Scratch Org Credentials"
            echo '```'
            sf org display --target-org "$SCRATCH_ORG_ALIAS"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Read .claude/skills/sf-ticket-to-pr/SKILL.md for instructions.

            Issue #${{ github.event.issue.number || inputs.issue_number }}: ${{ github.event.issue.title || inputs.issue_title }}

            ${{ github.event.issue.body || inputs.issue_body }}
          claude_args: "--max-turns 30 --model claude-sonnet-4-6"
          show_full_output: "true"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.WORKFLOW_PAT }}

      - name: Verify deliverable
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: "fix/issue-${{ github.event.issue.number || inputs.issue_number }}"
        run: |
          PR=$(gh pr list --repo ${{ github.repository }} --head "$BRANCH" --json number --jq '.[0].number' || echo "")
          if [ -n "$PR" ]; then
            echo "::notice::PR #$PR created on $BRANCH"
            exit 0
          fi
          echo "::error::Claude finished without opening a PR on $BRANCH"
          exit 1
