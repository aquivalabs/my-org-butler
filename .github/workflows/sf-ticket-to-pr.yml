name: SF Ticket to PR

run-name: "Ticket #${{ github.event.issue.number || github.event.pull_request.number }}: ${{ github.event.issue.title || github.event.pull_request.title }}"

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

jobs:
  pipeline:
    uses: aquivalabs/agentic-development/.github/workflows/sf-ticket-to-pr.yml@main
    secrets: inherit
