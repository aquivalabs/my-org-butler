name: SF Ticket to PR
# Fires when an issue is opened. Claude reads it, decides if it can be solved
# autonomously, and either opens a tested PR or comments on the issue explaining why not.

on:
  issues:
    types: [opened]

jobs:
  solve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Authenticate DevHub
        run: sf org login sfdx-url --set-default-dev-hub --sfdx-url-stdin <<< "${{ secrets.SFDX_AUTH_URL }}"

      - uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Read .claude/skills/sf-ticket-to-pr/SKILL.md for instructions.

            Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            ${{ github.event.issue.body }}
          claude_args: "--max-turns 30 --model claude-sonnet-4-6"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
