name: SF Ticket to PR
run-name: "Ticket #${{ github.event.issue.number || inputs.issue_number }}: ${{ github.event.issue.title || inputs.issue_title }}"
# Fires when an issue is opened. Claude reads it, decides if it can be solved
# autonomously, and either opens a tested PR or comments on the issue explaining why not.

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to process
        required: true
      issue_title:
        description: Issue title
        required: true
      issue_body:
        description: Issue body
        required: false

jobs:
  ticket-to-pr:
    name: ticket-to-pr
    runs-on: ubuntu-latest
    env:
      # Tells create-scratch-org.sh to skip the "set DevHub by alias" + "delete old scratch org" branch.
      # Auth is already done in the workflow step below; the value just needs to be non-empty.
      DEV_HUB_URL: set
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      # Mint an installation token for the Claude Bot GitHub App. PRs/commits/comments
      # made with this token are attributed to claude-bot[bot] — so the human reviewer
      # remains eligible to approve, and AI vs. human authorship stays distinguishable.
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.CLAUDE_BOT_APP_ID }}
          private-key: ${{ secrets.CLAUDE_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Authenticate DevHub
        run: sf org login sfdx-url --set-default-dev-hub --sfdx-url-stdin <<< "${{ secrets.SFDX_AUTH_URL }}"

      - name: Create branch for the fix
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          USER_ID=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"
          git checkout -b "fix/issue-${{ github.event.issue.number || inputs.issue_number }}"

      - name: Provision scratch org and run baseline tests
        run: HEADLESS=true ./scripts/create-scratch-org.sh

      - uses: anthropics/claude-code-action@v1
        id: claude
        with:
          prompt: |
            Read .claude/skills/sf-ticket-to-pr/SKILL.md for instructions.

            Issue #${{ github.event.issue.number || inputs.issue_number }}: ${{ github.event.issue.title || inputs.issue_title }}

            ${{ github.event.issue.body || inputs.issue_body }}
          claude_args: "--max-turns 30 --model claude-sonnet-4-6"
          show_full_output: "true"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}

      - name: Verify deliverable and report AI cost
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: "fix/issue-${{ github.event.issue.number || inputs.issue_number }}"
          ISSUE_NUMBER: "${{ github.event.issue.number || inputs.issue_number }}"
          WORKFLOW_NAME: ticket-to-pr
          MODEL: claude-sonnet-4-6
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          PR=$(gh pr list --repo ${{ github.repository }} --head "$BRANCH" --json number --jq '.[0].number' || echo "")
          if [ -n "$PR" ]; then
            echo "::notice::PR #$PR created on $BRANCH"
            PR_NUMBER="$PR" ./scripts/report-ai-cost.sh || echo "::warning::cost report failed"
            exit 0
          fi
          # No PR: still report cost on the issue rollup (no per-comment footer).
          ./scripts/report-ai-cost.sh || echo "::warning::cost report failed"
          echo "::error::Claude finished without opening a PR on $BRANCH"
          exit 1
