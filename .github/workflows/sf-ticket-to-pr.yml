name: SF Ticket to PR
run-name: "Ticket #${{ github.event.issue.number || inputs.issue_number }}: ${{ github.event.issue.title || inputs.issue_title }}"
# Fires when a maintainer adds the `delegate-to-ai` label to an issue. Without
# the label the pipeline does nothing — this gate is what stops random issues
# (open-source DoS, accidental drive-bys) from burning Anthropic credits.
# Only users with Triage role or higher can set labels in GitHub, so the gate
# is enforced by repo permissions, not by the workflow itself.
#
# Two-phase: a cheap triage job decides whether the agent can take the ticket
# (Acknowledge / Reject / Split). Only on Acknowledge does the expensive code
# job run — provisioning a scratch org, deploying, testing, opening the PR.
# Reject and Split runs cost only the triage Claude call.
#
# All operations run as `github-actions[bot]` via the default GITHUB_TOKEN.
# Two side effects worth knowing: (1) bot-authored events do not retrigger
# our workflows (no skipped-run noise from the bot's labels and comments),
# and (2) the agent cannot push branches that modify `.github/workflows/`
# files — that's intentional, CI changes belong in a separate human PR.

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to process
        required: true
      issue_title:
        description: Issue title
        required: true
      issue_body:
        description: Issue body
        required: false

# Opt JavaScript actions into Node.js 24 ahead of the June 2026 default switch,
# so actions/checkout@v4 etc. don't emit the Node-20-deprecation warning.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  triage:
    name: triage
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'delegate-to-ai'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    env:
      ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
    outputs:
      proceed: ${{ steps.outcome.outputs.proceed }}
      plan: ${{ steps.outcome.outputs.plan }}
    steps:
      - uses: actions/checkout@v4

      - name: Triage ticket
        uses: anthropics/claude-code-action@v1
        id: claude
        with:
          prompt: |
            Read .claude/skills/sf-ticket-to-pr/SKILL.md for instructions.

            Execute ONLY Step 1 — Triage. After posting your triage comment and
            applying exactly one of the labels (`ai-acknowledged`, `ai-rejected`,
            `ai-needs-split`), STOP. Do not proceed to Step 2, 3, or 4 — those
            will run in a separate workflow job that depends on the label you
            set. There is no scratch org or Salesforce CLI available here, so
            do not attempt deploys or tests.

            Tone for the triage comment (and any other human-facing text you
            write — PR descriptions, issue replies): strong opinions, no
            "Great question!" or "I'd be happy to help!", brevity mandatory,
            no emojis, call things out if the ticket is unclear or risky.
            Talk like a sharp colleague, not a support bot.

            Issue #${{ github.event.issue.number || inputs.issue_number }}: ${{ github.event.issue.title || inputs.issue_title }}

            ${{ github.event.issue.body || inputs.issue_body }}
          claude_args: "--max-turns 15 --model claude-sonnet-4-6"
          show_full_output: "true"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine triage outcome
        id: outcome
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LABELS=$(gh issue view "$ISSUE_NUMBER" --repo ${{ github.repository }} --json labels --jq '[.labels[].name] | join(" ")')
          if echo "$LABELS" | grep -qE "ai-acknowledged"; then
            echo "::notice::Triage outcome: acknowledged — code job will run."
            echo "proceed=true" >> $GITHUB_OUTPUT
            # Capture the agent's plan (its last bot-authored comment on the issue) so the
            # code job can include it in its prompt — saves the agent from re-fetching it.
            PLAN=$(gh api "/repos/${{ github.repository }}/issues/$ISSUE_NUMBER/comments" --jq 'map(select(.user.type == "Bot")) | last.body')
            { echo "plan<<EOF_PLAN"; echo "$PLAN"; echo "EOF_PLAN"; } >> $GITHUB_OUTPUT
          else
            echo "::notice::Triage outcome: $LABELS (rejected / needs-split / unset) — code job will be skipped."
            echo "proceed=false" >> $GITHUB_OUTPUT
          fi

      - name: Notify issue on triage failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --repo ${{ github.repository }} --body "The triage step failed before I could even decide whether to take this ticket. See the [run logs]($RUN_URL).

          A maintainer can re-trigger by removing and re-adding the \`delegate-to-ai\` label."

  code:
    name: code
    needs: triage
    if: needs.triage.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    # Serialize all runs that touch this PR's scratch org (this workflow plus pr-feedback).
    concurrency:
      group: scratch-org-pr-${{ github.event.issue.number || inputs.issue_number }}
      cancel-in-progress: false
    env:
      # Tells create-scratch-org.sh to skip the "set DevHub by alias" + "delete old scratch org" branch.
      # Auth is already done in the workflow step below; the value just needs to be non-empty.
      DEV_HUB_URL: set
      ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
      SCRATCH_ORG_ALIAS: pr-${{ github.event.issue.number || inputs.issue_number }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Authenticate DevHub
        run: sf org login sfdx-url --set-default-dev-hub --sfdx-url-stdin <<< "${{ secrets.SFDX_AUTH_URL }}"

      - name: Create branch for the fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "fix/issue-${{ github.event.issue.number || inputs.issue_number }}"

      # Persistent scratch org per PR: the auth URL is cached so subsequent runs (this workflow
      # rerunning, plus every pr-feedback run on the same PR) skip the multi-minute provisioning
      # path inside create-scratch-org.sh.
      - name: Restore scratch org auth from cache
        uses: actions/cache@v4
        with:
          path: /tmp/sfdx-auth-${{ env.SCRATCH_ORG_ALIAS }}.url
          key: scratch-auth-${{ env.SCRATCH_ORG_ALIAS }}

      - name: Provision or restore scratch org
        run: HEADLESS=true ./scripts/create-scratch-org.sh

      # create-scratch-org.sh just regenerated security-review/*.csv against the
      # unchanged source tree — that's our baseline for this run. Anything new in
      # the post-agent scan is the agent's fault.
      - name: Snapshot analyzer baseline
        run: cp -r security-review /tmp/analyzer-baseline

      - name: Implement the agreed plan
        uses: anthropics/claude-code-action@v1
        id: claude
        with:
          prompt: |
            Read .claude/skills/sf-ticket-to-pr/SKILL.md for instructions.

            Step 1 — Triage — has already been completed for this issue. The
            `ai-acknowledged` label is set. Skip Step 1 entirely and start at
            Step 2 — Code. Your earlier triage comment is reproduced below;
            implement exactly that plan, no scope drift.

            Tone for human-facing text (PR description, issue comments):
            strong opinions, no "Great question!" or "I'd be happy to help!",
            brevity mandatory, no emojis, call things out if you hit something
            unclear or risky. Talk like a sharp colleague, not a support bot.

            --- Your triage plan ---
            ${{ needs.triage.outputs.plan }}
            --- End plan ---

            Issue #${{ github.event.issue.number || inputs.issue_number }}: ${{ github.event.issue.title || inputs.issue_title }}

            ${{ github.event.issue.body || inputs.issue_body }}
          claude_args: "--max-turns 90 --model claude-sonnet-4-6"
          show_full_output: "true"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Re-scan and diff vs baseline
        id: analyzer_diff
        run: ./scripts/analyzer-check.sh /tmp/analyzer-baseline

      - name: Fix-up — agent addresses new findings
        if: steps.analyzer_diff.outputs.has_delta == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Your previous changes introduced new Salesforce Code Analyzer findings that are NOT in the baseline. Fix them all, redeploy, and push another commit to the PR branch. Do not touch `security-review/` — that's the human-curated baseline. If a finding cannot legitimately be fixed, stop and comment on the issue.

            New findings (rule|file|message):
            $(cat /tmp/analyzer-delta.txt)
          claude_args: "--max-turns 40 --model claude-sonnet-4-6"
          show_full_output: "true"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Final analyzer check
        if: steps.analyzer_diff.outputs.has_delta == 'true'
        run: ./scripts/analyzer-check.sh /tmp/analyzer-baseline --fail-on-delta

      - name: Restore baseline CSVs (agent must never commit them)
        if: always()
        run: cp /tmp/analyzer-baseline/*.csv security-review/

      - name: Verify deliverable and report AI cost
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: "fix/issue-${{ env.ISSUE_NUMBER }}"
          WORKFLOW_NAME: ticket-to-pr
          MODEL: claude-sonnet-4-6
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          PR=$(gh pr list --repo ${{ github.repository }} --head "$BRANCH" --json number --jq '.[0].number' || echo "")
          if [ -n "$PR" ]; then
            echo "::notice::PR #$PR created on $BRANCH"
            PR_NUMBER="$PR" ./scripts/report-ai-cost.sh || echo "::warning::cost report failed"
            exit 0
          fi
          # No PR: still report cost on the issue rollup (no per-comment footer).
          ./scripts/report-ai-cost.sh || echo "::warning::cost report failed"
          echo "::error::Claude finished without opening a PR on $BRANCH"
          exit 1

      - name: Notify issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --repo ${{ github.repository }} --body "The pipeline failed before I could finish your request. See the [run logs]($RUN_URL).

          Common causes are scratch-org provisioning errors or transient Salesforce platform issues that are unrelated to this issue. A maintainer can re-trigger by removing and re-adding the \`delegate-to-ai\` label."
