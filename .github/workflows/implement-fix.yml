name: Implement Fix
# Triggered when an issue is labeled 'automatable' by the Triage Ticket workflow.
# Claude writes the fix, then this workflow deploys to a scratch org, runs Apex tests,
# and opens a PR only if everything passes.

on:
  issues:
    types: [labeled]

jobs:
  implement:
    if: github.event.label.name == 'automatable'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write fix
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Read .claude/skills/sf-ticket-to-pr/commands/implement-fix.md for instructions.

            Fix issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            ${{ github.event.issue.body }}
          claude_args: "--max-turns 10 --model claude-sonnet-4-6"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4
        with:
          ref: ai/issue-${{ github.event.issue.number }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate Dev Hub
        run: echo "${{ secrets.SFDX_AUTH_URL }}" | sf org login sfdx-url --sfdx-url-stdin -a devhub --set-default-dev-hub

      - name: Create scratch org
        run: |
          sf org create scratch \
            --definition-file config/project-scratch-def.json \
            --alias ci-org \
            --no-namespace \
            --duration-days 1 \
            --set-default \
            --wait 20

      - name: Set language and permissions
        run: |
          sf data update record --sobject User --where "Name='User User'" --values "Languagelocalekey=en_US" --target-org ci-org
          sf org assign permset --name EinsteinGPTPromptTemplateManager --name AgentPlatformBuilder --target-org ci-org

      - name: Deploy no-namespace shims
        run: sf project deploy start --source-dir no-namespace --target-org ci-org --concise

      - name: Strip namespace from source
        run: |
          sed -i 's/aquiva_os__//g; s/aquiva_os\.//g; s/"namespace": "aquiva_os"/"namespace": ""/g' sfdx-project.json
          find force-app unpackaged -type f \( -name "*.cls" -o -name "*.xml" -o -name "*.genAiPlannerBundle" -o -name "*.genAiPlugin-meta.xml" -o -name "*.yaml" \) \
            -exec sed -i 's/aquiva_os__//g; s/aquiva_os\.//g' {} +

      - name: Deploy force-app
        run: sf project deploy start --source-dir force-app --target-org ci-org --concise --ignore-conflicts

      - name: Deploy unpackaged
        run: sf project deploy start --source-dir unpackaged --target-org ci-org --concise --ignore-conflicts

      - name: Run Apex tests
        id: tests
        run: |
          sf apex run test \
            --target-org ci-org \
            --test-level RunLocalTests \
            --code-coverage \
            --result-format human \
            --wait 30

      - name: Open PR
        if: success()
        run: |
          gh pr create \
            --title "fix: ${{ github.event.issue.title }}" \
            --body "Closes #${{ github.event.issue.number }}" \
            --head ai/issue-${{ github.event.issue.number }} \
            --base main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on failure
        if: failure()
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "AI attempted a fix but Apex tests failed. Branch \`ai/issue-${{ github.event.issue.number }}\` contains the attempt for manual inspection."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete scratch org
        if: always()
        run: sf org delete scratch --target-org ci-org --no-prompt
