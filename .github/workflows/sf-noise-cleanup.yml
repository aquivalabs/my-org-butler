name: SF Noise Cleanup
# Deletes skipped workflow runs so the Actions list stays signal, not noise.
# Skipped runs are created when bot-authored events (cost rollups, triage labels)
# fire workflow triggers that the job-level `if:` then correctly filters out.
# GitHub creates the run record anyway; this workflow prunes them.

on:
  schedule:
    - cron: '0 6 * * *'  # daily at 06:00 UTC
  workflow_dispatch:

jobs:
  prune:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete skipped runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IDS=$(gh run list --repo ${{ github.repository }} --status skipped --limit 100 --json databaseId --jq '.[].databaseId')
          if [ -z "$IDS" ]; then
            echo "::notice::No skipped runs to delete."
            exit 0
          fi
          for id in $IDS; do
            gh run delete "$id" --repo ${{ github.repository }} && echo "deleted $id"
          done
