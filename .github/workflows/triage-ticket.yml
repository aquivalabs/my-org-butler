name: Triage Ticket
# Triggered when any issue is opened. Claude classifies it and either
# labels it 'automatable' (triggering Implement Fix) or comments why it needs human input.

on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Read .claude/skills/sf-ticket-to-pr/commands/triage-ticket.md for instructions.

            Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            ${{ github.event.issue.body }}
          claude_args: "--max-turns 3 --model claude-sonnet-4-6"
          timeout_minutes: 5
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
